server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/teamtaskmanager}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${APP_DB_SCHEMA:teamtaskmanager}
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${APP_DB_SCHEMA:teamtaskmanager}
    default-schema: ${APP_DB_SCHEMA:teamtaskmanager}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32chars}
    expirationMinutes: ${JWT_EXP_MINUTES:120}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
